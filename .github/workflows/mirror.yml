name: Mirroring
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  MIRROR_URL: git@github.com:EpitechPGE3-2025/G-EIP-600-REN-6-1-eip-5.git

jobs:
  mirroring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{env.MIRROR_URL}}
          ssh_private_key: ${{secrets.MIRROR_SSH_KEY}}
